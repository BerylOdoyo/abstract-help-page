<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abstract Help Page</title>
    <link rel="stylesheet" href="/styles/header.css" />
    <link rel="stylesheet" href="/styles/general.css" />
    <link rel="stylesheet" href="/styles/search.css" />
  </head>
  <body>
    <div class="header">
      <div class="right-side">
        <img class="logo" src="icons/camera.svg" alt="logo" />
        <div class="abstract">Abstract |</div>
        <div class="help-center">Help Center</div>
      </div>

      <div class="left-side">
        <button class="submit-request-button">Submit a request</button>
        <button class="sign-in-button">Sign in</button>
      </div>
    </div>

    <div class="help-container">
      <div class="help-message">How can we help?</div>
      <div class="search-container">
        <input class="search-bar" type="text" placeholder="Search" />
        <button class="search-button">
          <img class="search-icon" src="images/arrow.svg" alt="search-icon" />
        </button>
      </div>
    </div>
  </body>
</html>
